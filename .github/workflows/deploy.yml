name: Build Finance Tools

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build React app
        run: npm run build
        env:
          DISABLE_ESLINT_PLUGIN: true

      # ── Build artifact upload ──────────────────────────────────────────────
      # Downloads the build/ folder as a zip from:
      # GitHub → Actions → latest run → Artifacts → "build"
      - name: Upload build as artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7

      # ── FTP Auto-deploy (disabled — enable when ready) ────────────────────
      # To enable: remove the # from each line below,
      # and add FTP_SERVER / FTP_USERNAME / FTP_PASSWORD in:
      # Repo → Settings → Secrets and variables → Actions
